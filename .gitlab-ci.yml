stages:
  - test
  - report

# TS check 
typescript-check:
  stage: test
  image: node:22
  script:
    - npm ci
    - npx tsc --noEmit
  cache:
    paths:
      - node_modules/

# UI tests
ui-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.44.0-jammy
  script:
    - npm ci
    - echo "DEMOQA_BASE_URL=https://demoqa.com" > .env
    - npx playwright install --with-deps
    - npm run test:ui
  artifacts:
    paths:
      - allure-results/     
      - playwright-report/
    expire_in: 30 days
  parallel: 3
  cache:
    paths:
      - node_modules/

# Allure 
allure-report:
  stage: report
  image: node:20 
  script:
    - npm ci
    - npm install -g allure-commandline
    - npx allure generate allure-results/ -o allure-report --clean
  artifacts:
    paths:
      - allure-report/
    expire_in: 30 days
  dependencies:
    - ui-tests
  when: always
