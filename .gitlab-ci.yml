stages:
  - test
  - report

# TS check
typescript-check:
  stage: test
  image: node:22
  script:
    - npm ci
    - npx tsc --noEmit
  cache:
    paths:
      - node_modules/

# UI tests
ui-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.1-jammy
  script:
    - npm ci
    - echo "DEMOQA_BASE_URL=https://demoqa.com" > .env
    - npm run test:ui
  artifacts:
    when: always
    paths:
      - allure-results/
      - playwright-report/
    expire_in: 30 days
  parallel: 3
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

# Allure
allure-report:
  stage: report
  image: openjdk:17-jdk-slim
  script:
    - npm install -g allure-commandline
    - npx allure generate allure-results/ -o allure-report --clean
  artifacts:
    paths:
      - allure-report/
    expire_in: 30 days
  dependencies:
    - ui-tests
  when: always
